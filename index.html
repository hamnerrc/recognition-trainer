<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Recog Trainer</title>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 12px;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ddd;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            user-select: none;
            touch-action: manipulation;
        }

        .container {
            background-color: #222;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 0 20px #000;
            text-align: center;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            max-height: calc(100dvh - 24px);
        }

        h1, h3 {
            margin: 10px 0;
            color: #eee;
        }

        #menu-screen,
        #statsScreen,
        #answerButtons {
            width: 100%;
        }

        #visual-slot {
            position: relative;
            width: min(92vw, 92dvh, 400px);
            aspect-ratio: 1 / 1;
            margin: 14px 0 8px 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #cube-container,
        #answer {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #answer {
            display: none;
        }

        #press-space {
            margin: 8px 0 10px 0;
            color: #aaa;
            font-size: 15px;
            min-height: 22px;
        }

        button,
        input[type="number"],
        select {
            background-color: #444;
            color: #ddd;
            border: none;
            border-radius: 8px;
            margin: 8px 0;
            width: min(100%, 320px);
            padding: 13px 14px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover,
        input[type="number"]:hover,
        select:hover {
            background-color: #666;
        }

        button:disabled {
            opacity: 0.6;
            cursor: default;
        }

        input[type="number"] {
            width: 100%;
            max-width: 180px;
            padding: 10px 12px;
            background-color: #333;
            border: 1px solid #555;
        }

        label {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
            color: #ddd;
            font-size: 15px;
            margin: 10px 0;
            width: 100%;
            max-width: 320px;
            text-align: left;
        }

        #btn-primary-action {
            display: none;
            width: min(100%, 320px);
            margin-top: 4px;
        }

        #answerButtons {
            display: none;
            margin-top: 10px;
            gap: 10px;
            flex-direction: column;
            align-items: center;
        }

        #answerButtons button {
            width: min(100%, 320px);
        }

        #statsScreen {
            display: none;
            margin-top: 10px;
        }

        #statsCards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        #statsCards > div {
            background-color: #333;
            width: clamp(92px, 40vw, 110px);
            height: clamp(92px, 40vw, 110px);
            border: 2px solid #555;
            border-radius: 10px;
            padding: 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #statsCards > div:hover {
            border-color: #777;
        }

        #statsCards img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #f44;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 14px;
            line-height: 20px;
            cursor: pointer;
        }

        #btn-back-menu {
            display: none;
            margin-top: 15px;
            width: min(100%, 320px);
        }

        #live-stats {
            margin-top: 12px;
            font-size: 15px;
            color: #aaa;
            min-height: 22px;
        }

        twisty-player,
        twisty-player * {
            opacity: 1 !important;
            transition: none !important;
            animation: none !important;
        }

        @media (max-width: 420px) {
            .container {
                padding: 14px;
            }

            button,
            input[type="number"],
            select,
            #btn-primary-action,
            #btn-back-menu {
                width: 100%;
            }

            #visual-slot {
                width: min(94vw, 94dvh, 360px);
            }
        }
    </style>
</head>
<body>
    <div class="container" tabindex="0" id="main-container">
        <div id="menu-screen">
            <h1>Recog Trainer</h1>
            <button id="btn-start">Start Training</button>
            <button id="btn-practice-missed">Practice Missed Cases</button>
            <button id="btn-show-stats">Show Stats</button>

            <label>
                <span>Recognition time:</span>
                <input type="number" id="input-recog-time" min="0.1" max="10" step="0.01" value="1" inputmode="decimal" />
            </label>

            <label>
                <span>Category:</span>
                <select id="select-category">
                    <option value="oll">OLL</option>
                    <option value="pll">PLL</option>
                </select>
            </label>
        </div>

        <div id="visual-slot">
            <div id="cube-container"></div>
            <div id="answer"></div>
        </div>

        <div id="press-space"></div>
        <button id="btn-primary-action">Reveal Answer</button>

        <div id="live-stats"></div>

        <div id="answerButtons">
            <button id="btn-correct">Right (1)</button>
            <button id="btn-wrong">Wrong (2)</button>
        </div>

        <div id="statsScreen">
            <h3>Missed Cases</h3>
            <div id="statsCards"></div>
            <button id="btn-clear-stats">Clear All Stats</button>
            <button id="btn-close-stats">Close Stats</button>
        </div>

        <button id="btn-back-menu">Back to Menu (Esc)</button>
    </div>

    <script src="LL-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
