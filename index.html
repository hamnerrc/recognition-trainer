<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recog Trainer</title>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        /* ——— Dark theme & layout ——— */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ddd;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        .container {
            background-color: #222;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px #000;
            text-align: center;
            width: 100%;
            max-width: 520px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            max-height: 95vh;
        }
        h1, h3 {
            margin: 10px 0;
            color: #eee;
        }
        #cube-container,
        #answer {
            margin: 15px 0;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            border-radius: 8px;
            border: 2px solid #333;
            position: relative;
        }
        #answerButtons {
            margin-top: 15px;
            display: none;
        }
        #statsScreen {
            display: none;
            margin-top: 10px;
            width: 100%;
        }
        #statsCards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        #statsCards > div {
            background-color: #333;
            width: 110px;
            height: 110px;
            border: 2px solid #555;
            border-radius: 10px;
            padding: 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #statsCards > div:hover {
            border-color: #777;
        }
        .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #f44;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 14px;
            line-height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button,
        input[type="number"],
        select {
            background-color: #444;
            color: #ddd;
            border: none;
            border-radius: 6px;
            margin: 8px 0;
            width: 200px;
            padding: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        button:hover,
        input[type="number"]:hover,
        select:hover {
            background-color: #666;
        }
        input[type="number"] {
            width: 70px;
            margin-left: 10px;
            padding: 8px;
            background-color: #333;
            border: 1px solid #555;
        }
        label {
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ddd;
            font-size: 15px;
            margin: 8px 0;
        }
        #btn-back-menu {
            display: none;
            margin-top: 15px;
            width: auto;
            padding: 8px 18px;
        }
        #live-stats {
            margin-top: 12px;
            font-size: 15px;
            color: #aaa;
        }
        /* Keep twisty-player clean */
        twisty-player,
        twisty-player * {
            opacity: 1 !important;
            transition: none !important;
            animation: none !important;
        }
    </style>
</head>
<body>
    <div class="container" tabindex="0" id="main-container">
        <div id="menu-screen">
            <h1>Recog Trainer</h1>
            <button id="btn-start">Start Training</button>
            <button id="btn-practice-missed">Practice Missed Cases</button>
            <button id="btn-show-stats">Show Stats</button>

            <label>
                Recognition time:
                <input type="number" id="input-recog-time" min="0.1" max="10" step="0.01" value="1" />
            </label>
            <label>
                Category:
                <select id="select-category">
                    <option value="oll">OLL</option>
                    <option value="pll">PLL</option>
                </select>
            </label>
        </div>

        <div id="cube-container"></div>
        <div id="answer"></div>
        <div id="live-stats"></div>

        <div id="answerButtons">
            <button id="btn-correct">Right (1)</button>
            <button id="btn-wrong">Wrong (2)</button>
        </div>

        <div id="statsScreen">
            <h3>Missed Cases</h3>
            <div id="statsCards"></div>
            <button id="btn-clear-stats">Clear All Stats</button>
            <button id="btn-close-stats">Close Stats</button>
        </div>

        <button id="btn-back-menu">Back to Menu (Esc)</button>
    </div>

    <script src="LL-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
