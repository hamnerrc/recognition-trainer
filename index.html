<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cube Trainer</title>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 12px;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ddd;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            user-select: none;
            touch-action: manipulation;
            transition: background-color 0.15s ease;
        }

        .container {
            background-color: #222;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 0 20px #000;
            text-align: center;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            max-height: calc(100dvh - 24px);
        }

        h1,
        h3 {
            margin: 10px 0;
            color: #eee;
        }

        #menu-screen,
        #answerButtons {
            width: 100%;
        }

        #selection-screen {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        #selection-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 12px;
        }

        #selection-buttons button {
            margin: 0;
        }

        #selection-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-height: 45vh;
            overflow-y: auto;
            width: 100%;
            margin-bottom: 15px;
            padding: 4px;
        }

        .case-toggle {
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            border: 3px solid transparent;
            border-radius: 8px;
            background-color: #333;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
            padding: 4px;
            transition: border-color 0.1s ease, background-color 0.1s ease;
        }

        .case-toggle.selected {
            border-color: #fff;
            background-color: #444;
        }

        .case-toggle .case-name {
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            color: #eee;
            text-align: center;
        }

        #visual-slot {
            position: relative;
            width: min(92vw, 92dvh, 400px);
            aspect-ratio: 1 / 1;
            margin: 14px 0 8px 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #cube-container,
        #answer {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #answer {
            display: none;
        }

        #press-space {
            margin: 8px 0 10px 0;
            color: #aaa;
            font-size: 15px;
            min-height: 22px;
        }

        button,
        input[type="number"],
        select {
            background-color: #444;
            color: #ddd;
            border: none;
            border-radius: 8px;
            margin: 8px 0;
            width: min(100%, 320px);
            padding: 13px 14px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover,
        input[type="number"]:hover,
        select:hover {
            background-color: #666;
        }

        button:disabled {
            opacity: 0.6;
            cursor: default;
        }

        input[type="number"] {
            width: 100%;
            max-width: 180px;
            padding: 10px 12px;
            background-color: #333;
            border: 1px solid #555;
        }

        label {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
            color: #ddd;
            font-size: 15px;
            margin: 10px 0;
            width: 100%;
            max-width: 320px;
            text-align: left;
        }

        #btn-primary-action {
            display: none;
            width: min(100%, 320px);
            margin-top: 4px;
        }

        #answerButtons {
            display: none;
            margin-top: 10px;
            gap: 10px;
            flex-direction: column;
            align-items: center;
        }

        #answerButtons button {
            width: min(100%, 320px);
        }

        #btn-back-menu {
            display: none;
            margin-top: 15px;
            width: min(100%, 320px);
        }

        #live-stats {
            margin-top: 12px;
            font-size: 15px;
            color: #aaa;
            min-height: 44px;
            line-height: 1.4;
        }

        #tbld-mode-wrap {
            display: none;
            width: 100%;
            max-width: 320px;
        }

        .name-card {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: clamp(2rem, 14vw, 4.5rem);
            font-weight: bold;
            color: #eee;
            letter-spacing: 0.06em;
            text-align: center;
            padding: 12px;
        }

        .name-card-answer {
            font-size: clamp(1.8rem, 11vw, 3.8rem);
        }

        twisty-player,
        twisty-player * {
            opacity: 1 !important;
            transition: none !important;
            animation: none !important;
        }

        @media (max-width: 420px) {
            .container {
                padding: 14px;
            }

            button,
            input[type="number"],
            select,
            #btn-primary-action,
            #btn-back-menu {
                width: 100%;
            }

            #visual-slot {
                width: min(94vw, 94dvh, 360px);
            }
        }
    </style>
</head>

<body>
    <div class="container" tabindex="0" id="main-container">
        <div id="menu-screen">
            <h1>Cube Trainer</h1>
            <button id="btn-start">Select Cases & Start</button>

            <label>
                <span>Recognition time:</span>
                <input type="number" id="input-recog-time" min="0.1" max="10" step="0.01" value="1"
                    inputmode="decimal" />
            </label>

            <label>
                <span>Category:</span>
                <select id="select-category">
                    <option value="oll">OLL</option>
                    <option value="pll">PLL</option>
                    <option value="tbld">Team Blind</option>
                </select>
            </label>

            <div id="tbld-mode-wrap">
                <label>
                    <span>Sub-set:</span>
                    <select id="select-tbld-subset">
                        <option value="f2l">F2L</option>
                        <option value="oll_named">OLL</option>
                    </select>
                </label>
                <label>
                    <span>Mode:</span>
                    <select id="select-tbld-mode">
                        <option value="solver">Solver — name → picture</option>
                        <option value="speaker">Speaker — picture → name</option>
                    </select>
                </label>
            </div>
        </div>

        <div id="selection-screen">
            <h3>Select Cases</h3>
            <div id="selection-buttons">
                <button id="btn-select-all">Select All</button>
                <button id="btn-deselect-all">Deselect All</button>
            </div>
            <div id="selection-grid"></div>
            <button id="btn-start-training">Begin Training</button>
        </div>

        <div id="visual-slot">
            <div id="cube-container"></div>
            <div id="answer"></div>
        </div>

        <div id="press-space"></div>
        <button id="btn-primary-action">Reveal Answer</button>

        <div id="live-stats"></div>

        <div id="answerButtons">
            <button id="btn-correct">Right (1)</button>
            <button id="btn-wrong">Wrong (2)</button>
        </div>

        <button id="btn-back-menu">Back to Menu (Esc)</button>
    </div>

    <script src="utils/LL-database.js"></script>
    <script src="script.js"></script>
</body>

</html>
